service:
  identifier: pm_auto_svc_nFZWG
  name: pm_auto_svc_nFZWG
  tags: {}
  serviceDefinition:
    spec:
      artifacts:
        primary:
          primaryArtifactRef: <+input>
          sources:
            - spec:
                # account.harnessImage is created/updated by CDNG Setup#createOrUpdateHarnessImageDockerConnector (QA).
                connectorRef: account.harnessImage
                imagePath: library/nginx
                tag: <+input>
              identifier: s1
              type: DockerRegistry
      variables:
        - name: svar1
          type: String
          value: acasc
        - name: svar2
          type: String
          value: us
      manifests:
        - manifest:
            identifier: nginxapp
            type: K8sManifest
            spec:
              # Same Git + path pattern as cdpNG V2Service (AccGithubConnector ensured in project-move test).
              store:
                type: Git
                spec:
                  connectorRef: account.AccGithubConnector
                  gitFetchType: Branch
                  paths:
                    - path
                  branch: master
              skipResourceVersioning: false
              enableDeclarativeRollback: false
    type: Kubernetes
  gitOpsEnabled: false
